services:
  financial-insights:
    build: .
    image: financial-insights:latest
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      # Mount local transactions folder (read-only); CSV files are never baked into the image
      - ./data/transactions:/app/data/transactions:ro
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-3000}/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
